{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h1 class="h4 mb-3">Create Ticket</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Submit Ticket</button>
    </form>
</div>
{% endblock content %}
